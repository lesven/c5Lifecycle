framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false
    handle_all_throwables: true

    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax

    csrf_protection: true

    php_errors:
        log: true

    uid:
        default_uuid_version: 7
        time_based_uuid_version: 7

    router:
        utf8: true
